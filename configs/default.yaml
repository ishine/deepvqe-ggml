model:
  mic_channels: [2, 64, 128, 128, 128, 128]
  far_channels: [2, 32, 128]
  align_hidden: 32
  dmax: 32
  align_temp_start: 1.0
  align_temp_end: 0.1
  align_temp_epochs: 20
  power_law_c: 0.3

audio:
  sample_rate: 16000
  n_fft: 512
  hop_length: 256
  n_freqs: 257  # n_fft // 2 + 1

training:
  batch_size: 32
  grad_accum_steps: 2
  num_workers: 12
  lr: 1.2e-3
  weight_decay: 5.0e-7
  epochs: 250
  clip_length_sec: 3.0
  amp: true
  grad_clip: 5.0
  warmup_epochs: 3
  checkpoint_every: 5
  keep_checkpoints: 5
  early_stop_patience: 30
  early_stop_min_delta: 1.0e-4
  delay_acc_min: 0.5
  erle_min_db: 3.0
  lr_scheduler: cosine_restarts
  lr_patience: 5               # fallback if switched to plateau
  lr_factor: 0.5
  lr_min: 1.0e-6
  lr_cosine_t0: 50
  lr_cosine_tmult: 2

loss:
  # Pure reconstruction loss — mag-L1 + time-L1 only.
  # No delay/entropy/energy supervision; model learns end-to-end.
  plcmse_weight: 0.0
  mag_l1_weight: 1.0
  time_l1_weight: 1.0
  sisdr_weight: 0.0
  smooth_l1_weight: 0.0
  smooth_l1_beta: 0.01
  energy_preservation_weight: 0.0
  energy_pres_mode: relative
  delay_weight: 0.0
  entropy_weight: 0.0
  mask_reg_weight: 0.0
  power_law_c: 0.3

data:
  clean_dir: "/data/dns5/clean"
  noise_dir: "/data/dns5/noise"
  rir_dir: "/data/dns5/impulse_responses"
  farend_dir: ""      # empty = reuse clean_dir
  snr_range: [5, 40]
  ser_range: [-10, 10]
  delay_range: [0, 320]  # ms
  max_delay_frames: 32   # matches dmax
  single_talk_prob: 0.2
  max_rir_length_ms: 500
  drr_range: [0, 20]
  num_val: 1000

eval:
  pesq_subset: 200
  audio_samples: 10

paths:
  checkpoint_dir: checkpoints
  log_dir: logs

hub:
  push_to_hub: false
  hub_model_id: ""
  push_logs_every: 5
  push_checkpoints: true
