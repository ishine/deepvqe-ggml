model:
  mic_channels: [2, 64, 128, 128, 128, 128]
  far_channels: [2, 32, 128]
  align_hidden: 32
  dmax: 32
  align_temp_start: 1.0
  align_temp_end: 0.1
  align_temp_epochs: 20
  power_law_c: 0.3

audio:
  sample_rate: 16000
  n_fft: 512
  hop_length: 256
  n_freqs: 257  # n_fft // 2 + 1

training:
  batch_size: 32
  grad_accum_steps: 2
  num_workers: 12
  optimizer: soap            # "schedulefree" or "soap"
  lr: 1.0e-3
  weight_decay: 5.0e-7
  epochs: 100
  clip_length_sec: 3.0
  amp: true
  grad_clip: 5.0
  warmup_epochs: 5
  checkpoint_every: 5
  keep_checkpoints: 5
  early_stop_patience: 0
  early_stop_min_delta: 1.0e-4
  delay_acc_min: 0.5
  erle_min_db: 3.0

loss:
  # Pure reconstruction loss — mag-L1 + time-L1 only.
  # No delay/entropy/energy supervision; model learns end-to-end.
  plcmse_weight: 0.0
  mag_l1_weight: 1.0
  time_l1_weight: 1.0
  sisdr_weight: 0.0
  smooth_l1_weight: 0.0
  smooth_l1_beta: 0.01
  energy_preservation_weight: 0.0
  energy_pres_mode: relative
  delay_weight: 0.0
  entropy_weight: 0.0
  mask_reg_weight: 0.0
  power_law_c: 0.3

data:
  clean_dir: "/workspace/deepvqe/datasets_fullband/clean"
  noise_dir: "/workspace/deepvqe/datasets_fullband/noise"
  rir_dir: "/workspace/deepvqe/datasets_fullband/impulse_responses"
  farend_dir: ""      # empty = reuse clean_dir
  snr_range: [5, 40]
  ser_range: [-10, 10]
  delay_range: [0, 320]  # ms
  max_delay_frames: 32   # matches dmax
  single_talk_prob: 0.2
  max_rir_length_ms: 500
  drr_range: [0, 20]
  dnsmos_ovrl_min: 3.0  # DNSMOS quality filter (0=disabled)
  num_val: 1000

eval:
  pesq_subset: 200
  dnsmos_subset: 100
  aecmos_subset: 100
  audio_samples: 10

paths:
  checkpoint_dir: ../checkpoints/train
  log_dir: ../logs/train
